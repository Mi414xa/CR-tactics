<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clash Royale: Защита</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Стиль для кнопки возврата */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #226177;
      border: none;
      color: white;
      font-size: 18px;
      padding: 10px 20px;
      border-radius: 50px;
      border-bottom: 5px solid #0d3c49;
      cursor: pointer;
      z-index: 1000;
      font-family: inherit;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover {
      background: #2d7e9a;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
<a href="../index.html" class="back-btn">← В меню</a>

<div class="game-wrapper">
  <div class="arena" id="arena"></div>
  <div class="enemy-zone" id="enemyZone"></div>
  <div class="deck-panel"><div class="cards-row" id="deckCards"></div></div>
  <div class="control-panel">
    <div class="diff-group" id="diffGroup"></div>
    <div class="info-box" id="infoBox"></div>
    <button class="reset-btn" id="resetBtn">⟳ Сброс</button>
  </div>
  <div class="message-bar" id="messageBox">⭐ Выберите карту и клетку</div>
</div>

<div class="popup" id="popup">
  <div class="popup-message" id="popupMsg"></div>
  <div class="popup-sub" id="popupSub"></div>
  <button class="popup-button" id="popupBtn">ЗАНОВО</button>
</div>

<script src="js/cards.js"></script>
<script src="js/towers.js"></script>
<script src="js/scenarios.js"></script>
<script src="js/game.js"></script>
</body>
</html>
